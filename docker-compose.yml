version: "3.9"

services:
  api:
    build: .
    container_name: balligh_api
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      UPLOAD_DIR: "uploads"
    volumes:
      - .:/app
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
      alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

  db:
    image: postgres:15
    container_name: balligh_db
    restart: always
    environment:
      POSTGRES_USER: baligh_user
      POSTGRES_PASSWORD: baligh_pass
      POSTGRES_DB: baligh_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U baligh_user -d baligh_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  uploads_data:
  postgres_data: